<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sans Breakout - DETERMINATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="crt-overlay"></div>

    <div id="game-container">
        <!-- Audio Unlock Screen (Crucial for modern browsers) -->
        <div id="boot-screen" class="overlay active">
            <h2>CLICK ANYWHERE TO START</h2>
            <p>Initializing Audio Context...</p>
        </div>

        <!-- Main Menu -->
        <div id="menu-screen" class="overlay">
            <h1 class="title">DETERMINATION</h1>
            
            <div class="menu-layout">
                <div class="controls-box">
                    <h3>SELECT PLATFORM</h3>
                    <button class="btn" id="btn-pc">PLAY ON PC</button>
                    <button class="btn" id="btn-mobile">PLAY ON MOBILE</button>
                    <p class="sub-text">PC: Mouse or L/R Arrows</p>
                </div>

                <div class="settings-box">
                    <h3>SETTINGS</h3>
                    <div class="slider-row">
                        <span>MUS</span>
                        <input type="range" id="vol-music" min="0" max="1" step="0.05" value="0.5">
                    </div>
                    <div class="slider-row">
                        <span>SFX</span>
                        <input type="range" id="vol-sfx" min="0" max="1" step="0.05" value="0.5">
                    </div>
                </div>
            </div>
            
            <div class="legend">
                DROPS: [S]=Slow | [🍄]=Grow | [⭐]=Multi | [💣]=Damage
            </div>
        </div>

        <!-- HUD -->
        <div id="hud" class="hidden">
            <div class="hud-top">
                <span>HI-SCORE: <span id="ui-hiscore">0</span></span>
                <span id="ui-timer" class="hidden">02:00</span>
                <span>SCORE: <span id="ui-score">0</span></span>
            </div>
            <div class="hud-bottom">
                <div class="hp-container">
                    HP <div class="hp-bar-bg"><div id="hp-bar-fill"></div></div> <span id="ui-hp">20/20</span>
                </div>
            </div>
        </div>

        <canvas id="game-canvas" width="480" height="640"></canvas>

        <!-- Undertale Dialogue Box -->
        <div id="dialogue-box" class="hidden">
            <div class="dialogue-inner">
                <div id="portrait">💣</div>
                <div class="text-area">
                    <div id="speaker-name">BOMB</div>
                    <div id="dialogue-text"></div>
                </div>
            </div>
        </div>

        <!-- Final Choice -->
        <div id="choice-screen" class="overlay hidden">
            <h2 class="judgement">JUDGEMENT</h2>
            <div class="choice-btns">
                <button class="btn fight" id="btn-kill">[ FIGHT ]</button>
                <button class="btn mercy" id="btn-spare">[ MERCY ]</button>
            </div>
        </div>

        <!-- Mobile Touch Slider -->
        <div id="mobile-controls" class="hidden">
            <div class="slider-track" id="touch-track">
                <div class="slider-thumb" id="touch-thumb"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
