<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sans Breakout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="hud">
            <span>SCORE: <b id="score">0</b></span>
            <span>LV: <b id="level">1</b></span>
            <span>HP: <b id="hp">20</b></span>
        </div>
        
        <div id="game-area">
            <canvas id="gameCanvas" width="400" height="500"></canvas>
            
            <div id="bossDialogue" class="overlay hidden">
                <div class="dialogue-box">
                    <span id="bossName">SANS:</span>
                    <p id="dialogueText"></p>
                </div>
            </div>

            <div id="startScreen" class="overlay">
                <h1 id="title">DETERMINATION</h1>
                <div class="menu-buttons">
                    <button onclick="startGame('pc')">PC</button>
                    <button onclick="startGame('mobile')">MOBILE</button>
                </div>
                <p style="margin-top:20px; font-size:0.8rem; color:#666;">(Click anywhere to wake up the music)</p>
            </div>

            <div id="gameOverScreen" class="overlay hidden">
                <h1 style="color: red; text-shadow: 0 0 10px red;">STAY DETERMINED...</h1>
                <button onclick="location.reload()">RETRY</button>
            </div>

            <div id="mobileControls" class="hidden">
                <button id="leftBtn">←</button>
                <button id="upBtn">↑</button>
                <button id="downBtn">↓</button>
                <button id="rightBtn">→</button>
            </div>
        </div>
    </div>

    <!-- Audio setup -->
    <audio id="menuMusic" loop src="menu.ogg"></audio>
    <audio id="battleMusic" loop src="battle.ogg"></audio>
    <audio id="loseMusic" src="lose.ogg"></audio>

    <script src="script.js"></script>
</body>
</html>
