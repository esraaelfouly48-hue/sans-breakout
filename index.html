<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANS BREAKOUT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-box">
        <div class="ui-header">
            <span>HI-SCORE: <span id="hi-score">0</span></span>
            <span id="timer" class="hidden">02:00</span>
            <span>SCORE: <span id="score">0</span></span>
        </div>

        <canvas id="gameCanvas"></canvas>

        <!-- MENU -->
        <div id="menu" class="overlay">
            <h1 class="ut-title">DETERMINATION</h1>
            <div class="menu-btns">
                <button onclick="Game.start('pc')">PLAY ON PC</button>
                <button onclick="Engine.unlockAudio(); Game.start('mobile')">PLAY ON MOBILE</button>
            </div>
            <div class="settings">
                <div class="set-row"><span>MUS</span><input type="range" id="m-vol" min="0" max="1" step="0.1" value="0.5"></div>
                <div class="set-row"><span>SFX</span><input type="range" id="s-vol" min="0" max="1" step="0.1" value="0.5"></div>
            </div>
            <p class="legend">[S] Slow | [🍄] Big | [⭐] Multi | [💣] DMG</p>
        </div>

        <!-- DIALOGUE -->
        <div id="dialogue-ui" class="hidden">
            <div class="diag-box">
                <div id="portrait">💣</div>
                <div class="diag-body">
                    <div id="name">BOMB</div>
                    <div id="text"></div>
                </div>
            </div>
        </div>

        <!-- ENDING CHOICES -->
        <div id="choice-ui" class="hidden">
            <button class="choice-btn kill" onclick="Game.resolve('kill')">[ KILL ]</button>
            <button class="choice-btn spare" onclick="Game.resolve('spare')">[ SPARE ]</button>
        </div>

        <!-- MOBILE CONTROL PAD -->
        <div id="mobile-ctrl" class="hidden">
            <div class="touch-track"><div id="touch-handle"></div></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
