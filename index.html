<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOMB BREAKOUT: DETERMINATION</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <!-- Overlay UI Layers -->
        <div id="boot-screen" class="overlay active">
            <h1>BOMB BREAKOUT</h1>
            <p>[ CLICK TO START ]</p>
        </div>

        <div id="menu-screen" class="overlay">
            <div class="menu-content">
                <h2>CHOOSE YOUR INPUT</h2>
                <button id="btn-pc">PC (MOUSE/KEYS)</button>
                <button id="btn-mobile">MOBILE (TOUCH)</button>
                <div class="settings">
                    <label>MUSIC: <input type="range" id="vol-music" min="0" max="1" step="0.1" value="0.5"></label>
                    <label>SFX: <input type="range" id="vol-sfx" min="0" max="1" step="0.1" value="0.5"></label>
                </div>
            </div>
        </div>

        <div id="hud" class="hidden">
            <div class="stats-row">
                <span id="label-score">SCORE: <span id="ui-score">0</span></span>
                <span id="label-hiscore">HI-SCORE: <span id="ui-hiscore">0</span></span>
            </div>
            <div class="hp-container">
                <span class="hp-label">HP</span>
                <div class="hp-bar-bg"><div id="hp-bar-fill"></div></div>
                <span id="ui-hp">100/100</span>
            </div>
            <div id="ui-timer" class="hidden">00:00</div>
        </div>

        <div id="dialogue-box" class="hidden">
            <div id="portrait">💣</div>
            <div class="dialogue-content">
                <div id="speaker-name">BOMB</div>
                <div id="dialogue-text"></div>
            </div>
        </div>

        <div id="choice-screen" class="overlay">
            <h2>HE IS VULNERABLE</h2>
            <div class="choice-buttons">
                <button id="btn-kill" class="btn-retro red">FIGHT</button>
                <button id="btn-spare" class="btn-retro yellow">SPARE</button>
            </div>
        </div>

        <canvas id="game-canvas" width="480" height="600"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
