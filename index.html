<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battle Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="boot-screen" class="screen active">
    <div class="center-box">
      <h1>Battle Game</h1>
      <p>Tap to start</p>
    </div>
  </div>

  <div id="menu-screen" class="screen">
    <div class="panel">
      <h1>Main Menu</h1>
      <p>Choose a mode</p>

      <button id="start-battle-btn">Start Battle</button>
      <button id="start-boss-btn">Start Boss Battle</button>

      <div class="sliders">
        <label>
          Music
          <input id="vol-music" type="range" min="0" max="1" step="0.01" value="0.5" />
        </label>

        <label>
          SFX
          <input id="vol-sfx" type="range" min="0" max="1" step="0.01" value="0.5" />
        </label>
      </div>
    </div>
  </div>

  <div id="battle-screen" class="screen">
    <div class="hud">
      <div class="stat">
        <span>HP</span>
        <div class="bar"><div id="hp-bar-fill" class="bar-fill"></div></div>
        <div id="ui-hp" class="stat-text">100/100</div>
      </div>

      <div class="stat">
        <span>Enemy HP</span>
        <div class="bar"><div id="enemy-hp-bar-fill" class="bar-fill"></div></div>
        <div id="enemy-hp" class="stat-text">100/100</div>
      </div>
    </div>

    <div class="battle-area">
      <div class="enemy">Enemy</div>

      <div class="battle-buttons">
        <button id="attack-btn">Attack</button>
        <button id="back-to-menu-btn">Back to Menu</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
