<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>☠ BREAKOUT: BOSS RUSH ☠</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="wrapper">
    <div id="scanlines"></div>
    <div id="crt-vignette"></div>

    <!-- ══════════════════════════════════════
         MENU SCREEN
    ══════════════════════════════════════ -->
    <div id="menu">
      <div id="menu-hi-row">HI-SCORE: <span id="menu-hi-val">0</span></div>

      <div id="menu-hp-section">
        <span class="mhp-label">HP</span>
        <div class="mhp-bar-outer"><div class="mhp-bar-inner" id="mhp-fill"></div></div>
        <span id="mhp-text">100</span>
      </div>

      <div id="menu-title">
        <div class="title-line">☠ BREAKOUT</div>
        <div class="title-line accent">BOSS RUSH ☠</div>
      </div>

      <div id="menu-tagline">CLEAR BLOCKS · SURVIVE THE BOMB · FACE YOUR FATE</div>

      <div id="drop-legend">
        <div class="leg-item"><span class="leg-k">S</span><span>Slow Ball</span></div>
        <div class="leg-item"><span class="leg-k">🍄</span><span>Big Paddle</span></div>
        <div class="leg-item"><span class="leg-k">⭐</span><span>Extra Ball</span></div>
        <div class="leg-item"><span class="leg-k">💣</span><span>−15 HP!</span></div>
      </div>

      <div id="settings-panel">
        <div class="setting-row">
          <label class="set-lbl">🎵 MUSIC</label>
          <input type="range" id="music-vol" min="0" max="1" step="0.01" value="0.5">
          <span id="music-pct">50%</span>
        </div>
        <div class="setting-row">
          <label class="set-lbl">🔊 SFX</label>
          <input type="range" id="sfx-vol" min="0" max="1" step="0.01" value="0.5">
          <span id="sfx-pct">50%</span>
        </div>
      </div>

      <div id="platform-select">
        <button class="menu-btn primary" id="btn-pc">▶ PLAY ON PC</button>
        <button class="menu-btn secondary" id="btn-mobile">📱 PLAY ON MOBILE</button>
      </div>

      <div id="menu-footer">MOUSE/ARROWS · PC &nbsp;|&nbsp; DRAG CANVAS · MOBILE</div>
    </div>

    <!-- ══════════════════════════════════════
         GAME CANVAS
    ══════════════════════════════════════ -->
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <!-- ══════════════════════════════════════
         HUD
    ══════════════════════════════════════ -->
    <div id="hud">
      <div id="hud-score">
        <div class="hud-lbl">SCORE</div>
        <div id="score-val">0</div>
      </div>
      <div id="hud-center">
        <div id="hp-bar-outer"><div id="hp-bar-fill"></div></div>
        <div id="hp-text">100 HP</div>
      </div>
      <div id="hud-right">
        <div id="round-label">ROUND 1</div>
        <div id="hi-label">HI: <span id="hi-val">0</span></div>
      </div>
    </div>

    <!-- ══════════════════════════════════════
         ACTIVE POWERUP BADGES
    ══════════════════════════════════════ -->
    <div id="pu-status"></div>

    <!-- ══════════════════════════════════════
         BOSS TIMER BAR
    ══════════════════════════════════════ -->
    <div id="boss-timer-wrap">
      <div id="boss-timer-fill"></div>
      <div id="boss-timer-text">2:00</div>
    </div>

    <!-- ══════════════════════════════════════
         DIALOGUE OVERLAY
    ══════════════════════════════════════ -->
    <div id="dialogue-overlay">
      <div id="dialogue-box">
        <div id="dlg-left">
          <canvas id="portrait-canvas" width="80" height="80"></canvas>
          <div id="dlg-name"></div>
        </div>
        <div id="dlg-right">
          <div id="dlg-text"></div>
        </div>
      </div>
      <div id="dlg-prompt">▼ CLICK / TAP TO CONTINUE</div>
    </div>

    <!-- ══════════════════════════════════════
         CLIMAX OVERLAY
    ══════════════════════════════════════ -->
    <div id="climax-overlay">
      <div id="climax-msg">— THE MOMENT OF TRUTH —</div>
      <div id="climax-sub">What will you do?</div>
      <div id="climax-btns">
        <button id="btn-fight">⚔ FIGHT</button>
        <button id="btn-spare">❤ SPARE</button>
      </div>
    </div>

    <!-- ══════════════════════════════════════
         GAME OVER OVERLAY
    ══════════════════════════════════════ -->
    <div id="gameover-overlay">
      <div id="go-skull">☠</div>
      <div id="go-title">GAME OVER</div>
      <div id="go-score-line"></div>
      <div id="go-hi-line"></div>
      <button id="btn-restart">↩ PLAY AGAIN</button>
    </div>

  </div><!-- end wrapper -->

  <script src="script.js"></script>
</body>
</html>
