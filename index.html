<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Determination: The Complete Boss Fight</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="wrapper">
        <div id="crt-scanlines"></div>
        
        <!-- HUD Layer -->
        <div class="hud">
            <div class="score-container">HI-SCORE: <span id="hi-score">0</span></div>
            <div id="timer" class="hidden">02:00</div>
            <div class="score-container">SCORE: <span id="score">0</span></div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <!-- UI Overlays -->
        <div id="menu" class="overlay">
            <h1 class="glitch-text" data-text="DETERMINATION">DETERMINATION</h1>
            <div class="platform-buttons">
                <button onclick="Engine.init('pc')">PLAY ON PC</button>
                <button onclick="Engine.init('mobile')">PLAY ON MOBILE</button>
            </div>
            <div class="settings-box">
                <div class="setting">
                    <label>MUSIC</label>
                    <input type="range" id="musicVol" min="0" max="1" step="0.05" value="0.5">
                </div>
                <div class="setting">
                    <label>SFX</label>
                    <input type="range" id="sfxVol" min="0" max="1" step="0.05" value="0.5">
                </div>
            </div>
            <div class="legend">
                [S] Slow | [🍄] Grow | [⭐] Multi | [💣] DMG
            </div>
        </div>

        <div id="dialogue-box" class="hidden">
            <div class="diag-layout">
                <div id="portrait">💣</div>
                <div class="text-content">
                    <div id="speaker">BOMB</div>
                    <div id="message"></div>
                </div>
            </div>
        </div>

        <div id="choice-ui" class="hidden">
            <button class="choice-btn kill" onclick="Engine.resolveChoice('kill')">[ KILL ]</button>
            <button class="choice-btn spare" onclick="Engine.resolveChoice('spare')">[ SPARE ]</button>
        </div>

        <div id="mobile-ctrl" class="hidden">
            <div class="track">
                <div id="handle"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
